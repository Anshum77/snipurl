services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: snipurl
      POSTGRES_USER: snipurl
      POSTGRES_PASSWORD: snipurl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://snipurl:snipurl@db:5432/snipurl
      APP_BASE_URL: http://localhost:8000
      REDIS_URL: redis://redis:6379/0
      GEOIP_DB_PATH: ""
    volumes:
      - ./:/app
    depends_on:
      - db
      - redis

volumes:
  postgres_data:

